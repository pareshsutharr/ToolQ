name: SEO canonical check

on:
  workflow_dispatch:
  schedule:
    - cron: "30 3 * * *"

jobs:
  seo-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify canonical SEO
        run: npm run seo:check
